{% load static %}
<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Painel Administrativo</title>

    <!-- favicon -->
    <link rel="shortcut icon"
          type="image/png"
          href="{% static 'assets/images/logos/favicon.png' %}" />

    <!-- css -->
    <link rel="stylesheet"
          href="{% static 'assets/css/styles.min.css' %}" />
</head>

<body>

<div class="page-wrapper"
     id="main-wrapper"
     data-layout="vertical"
     data-navbarbg="skin6"
     data-sidebartype="full"
     data-sidebar-position="fixed"
     data-header-position="fixed">

    <!-- SIDEBAR -->
    <aside class="left-sidebar">

        <div>

            <!-- logo -->
            <div class="brand-logo d-flex align-items-center justify-content-between">

                <a href="/" class="text-nowrap logo-img">

                    <img src="{% static 'assets/images/logos/logo.svg' %}" alt="logo" />

                </a>

            </div>

            <!-- menu -->
            <nav class="sidebar-nav scroll-sidebar">

                <ul id="sidebarnav">

                    <li class="nav-small-cap">
                        <span class="hide-menu">MENU</span>
                    </li>

                    <li class="sidebar-item">
                        <a class="sidebar-link" href="/">

                            <i class="ti ti-home"></i>

                            <span class="hide-menu">
                                Dashboard
                            </span>

                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a class="sidebar-link" href="/admin">

                            <i class="ti ti-settings"></i>

                            <span class="hide-menu">
                                Administração
                            </span>

                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a class="sidebar-link" href="/logout">

                            <i class="ti ti-logout"></i>

                            <span class="hide-menu">
                                Logout
                            </span>

                        </a>
                    </li>

                </ul>

            </nav>

        </div>

    </aside>

    <!-- BODY -->
    <div class="body-wrapper">

        <!-- TOPO -->
        <header class="app-header">

            <nav class="navbar navbar-expand-lg navbar-light">

                <div class="navbar-collapse justify-content-end px-4">

                    <ul class="navbar-nav flex-row ms-auto align-items-center">

                        <li class="nav-item">

                            <span class="fw-bold">

                                Olá,
                                {{ request.user.username }}

                            </span>

                        </li>

                    </ul>

                </div>

            </nav>

        </header>

        <!-- CONTEUDO -->
        <div class="body-wrapper-inner">

            <div class="container-fluid">

                <div class="row">

                    <div class="col-12">

                        <div class="card">

                            <div class="card-body">

                                <h3 class="card-title">

                                    Bem-vindo ao Sistema

                                </h3>

                                <p>

                                    Usuário autenticado com sucesso.

                                </p>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- jquery -->
<script src="{% static 'assets/libs/jquery/dist/jquery.min.js' %}"></script>

<!-- bootstrap -->
<script src="{% static 'assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js' %}"></script>

<!-- sidebar -->
<script src="{% static 'assets/js/sidebarmenu.js' %}"></script>

<!-- app -->
<script src="{% static 'assets/js/app.min.js' %}"></script>

<!-- apex -->
<script src="{% static 'assets/libs/apexcharts/dist/apexcharts.min.js' %}"></script>

<!-- simplebar -->
<script src="{% static 'assets/libs/simplebar/dist/simplebar.js' %}"></script>

<!-- dashboard -->
<script src="{% static 'assets/js/dashboard.js' %}"></script>

<!-- icons -->
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>

</body>

</html>
